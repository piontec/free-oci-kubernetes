apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: ">=1.14.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: kube-system
  values:
    provider:
      name: cloudflare
      cloudflare:
        proxied: true
    sources:
      - gateway-httproute
    policy: sync
    registry: txt
    domainFilters:
      - YOUR-DOMAIN
    txtOwnerId: oci-infra
    txtPrefix: _externaldns.
    interval: 1m
    extraArgs:
      - --annotation-filter=external-dns=enabled
      - --exclude-target-net=10.0.0.0/8
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: external-dns-cloudflare
            key: apiKey
