apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: kube-system
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  timeout: 5m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: cert-manager
      version: ">=1.9.1"
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: kube-system
  values:
    installCRDs: true
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true
    config:
      enableGatewayAPI: true
