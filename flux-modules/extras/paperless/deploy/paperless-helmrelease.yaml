apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  timeout: 5m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: paperless-ngx
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: paperless
        namespace: paperless
  dependsOn:
    - name: redis
  values:
    image:
      tag: 2.20.5
    controller:
      replicas: 1
    env: &paperless-env
      A_REDIS_PASSWORD:
        valueFrom:
          secretKeyRef:
            name: redis-pass
            key: pass
      PAPERLESS_ADMIN_PASSWORD:
        valueFrom:
          secretKeyRef:
            name: paperless-admin-password
            key: pass
      PAPERLESS_DBPASS:
        valueFrom:
          secretKeyRef:
            name: db-paperless-user-pass
            key: pass
      PAPERLESS_SECRET_KEY:
        valueFrom:
          secretKeyRef:
            name: paperless-secret-key
            key: pass
      PAPERLESS_DEBUG: false
      PAPERLESS_REDIS: redis://:$(A_REDIS_PASSWORD)@redis-master
      PAPERLESS_REDIS_PREFIX: paperless-pio
      PAPERLESS_DBENGINE: mariadb
      PAPERLESS_DBHOST: mariadb.db.svc
      PAPERLESS_DBPORT: 3306
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_URL: https://[YOUR-HOST]
      PAPERLESS_ADMIN_USER: admin
      PAPERLESS_OCR_LANGUAGE: pol
      PAPERLESS_OCR_LANGUAGES: pol
      PAPERLESS_OCR_SKIP_ARCHIVE_FILE: with_text
      PAPERLESS_TIME_ZONE: Europe/Warsaw
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
    persistence:
      data:
        enabled: true
        type: pvc
        existingClaim: paperless
        subPath:
          - path: data
            mountPath: /usr/src/paperless/data
          - path: media
            mountPath: /usr/src/paperless/media
          - path: export
            mountPath: /usr/src/paperless/export
          - path: consume
            mountPath: /usr/src/paperless/consume
          - path: tmp
            mountPath: /tmp/paperless
        mountPath: ""
      media:
        enabled: false
      export:
        enabled: false
      consume:
        enabled: false
    ingress:
      main:
        enabled: false
    postgresql:
      enabled: false
    mariadb:
      enabled: false
    redis:
      enabled: false
    sidecars:
      backup:
        command: ["/bin/bash"]
        args:
          [
            "-c",
            'set -Eeuo pipefail; info () { printf "%(%Y-%m-%d %H:%M:%S)T %s\n" -1 "$1"; }; on_err() {
            status=$?; info "Backup failed with exit code $status."; exit "$status"; }; trap on_err ERR;
            INIT_DELAY="10m"; DELAY="1d"; B2_VERSION="4.6.0"; info "Initial sleep of $INIT_DELAY to let the
            system start..."; sleep "$INIT_DELAY"; info "Installing pinned b2 version $B2_VERSION..."; python
            -m pip install --no-cache-dir "b2==$B2_VERSION" > /dev/null; info "Backup will be done every
            $DELAY"; if [[ ! -f /upload/upload.sh ]]; then info "Upload script missing: /upload/upload.sh";
            exit 1; fi; while true; do info "Starting backup..."; cd /usr/src/paperless/src &&
            /command/s6-setuidgid paperless python3 manage.py document_exporter -d -na -nt -sm
            --no-progress-bar --skip-checks ../export; info "Documents exported"; info "Executing
            /upload/upload.sh"; /bin/sh /upload/upload.sh /usr/src/paperless/export; info "Upload done"; info
            "Backup created"; sleep "$DELAY"; done;',
          ]
        env: *paperless-env
        envFrom:
          - secretRef:
              name: b2-backup
        image: '{{ include "bjw-s.common.lib.container.image" . }}'
        imagePullPolicy: "{{ .Values.image.pullPolicy }}"
        name: backup
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
          - mountPath: /usr/src/paperless/data
            name: data
            subPath: data
          - mountPath: /usr/src/paperless/media
            name: data
            subPath: media
          - mountPath: /usr/src/paperless/export
            name: data
            subPath: export
          - mountPath: /upload
            name: scripts
