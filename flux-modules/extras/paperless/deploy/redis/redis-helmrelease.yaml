apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  timeout: 5m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: redis
      version: ">=7.0.0"
      sourceRef:
        kind: HelmRepository
        name: redis
  valuesFrom:
    - kind: Secret
      name: redis-pass
      valuesKey: pass
      targetPath: "auth.password"
  values:
    architecture: standalone
    auth:
      enabled: true
      sentinel: true
      usePasswordFiles: false
    metrics:
      enabled: true
      service:
        enabled: true
      serviceMonitor:
        enabled: true
    master:
      persistence:
        existingClaim: redis
