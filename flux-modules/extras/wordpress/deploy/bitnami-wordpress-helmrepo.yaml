apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: bitnami-wordpress
spec:
  interval: 12h
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  url: oci://registry-1.docker.io/bitnamicharts/wordpress
  ref:
    semver: "*"
  # Note: Bitnami uses Notation signing on Docker Hub (not Cosign).
  # Flux OCIRepository verify.provider: notation requires a trust policy and certificate bundle
  # to be configured — add once a trust store Secret is in place.
