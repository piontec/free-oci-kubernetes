apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wordpress-${wp_name}
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chartRef:
    kind: OCIRepository
    name: bitnami-wordpress
  timeout: 10m
  valuesFrom:
    - kind: Secret
      name: wp-admin-pass
      valuesKey: wordpressPassword
      targetPath: wordpressPassword
    - kind: Secret
      name: db-user-pass
      valuesKey: pass
      targetPath: "externalDatabase.password"
  values:
    fullnameOverride: wp-${wp_name}
    wordpressUsername: admin
    wordpressBlogName: ${wp_blog_name}
    wordpressScheme: https
    wordpressEmail: ${wp_email}
    allowEmptyPassword: false
    wordpressExtraConfigContent: |
      @ini_set( 'upload_max_filesize' , '190M' );
      @ini_set( 'post_max_size', '190M');
      @ini_set( 'memory_limit', '256M' );
      @ini_set( 'max_execution_time', '300' );
      @ini_set( 'max_input_time', '300' );
    service:
      type: ClusterIP
    ingress:
      enabled: false
    persistence:
      enabled: true
      existingClaim: wordpress-storage
    containerSecurityContext:
      enabled: true
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    mariadb:
      enabled: false
    externalDatabase:
      host: mariadb.db.svc
      user: wp-${wp_name}
      database: wp-${wp_name}
    pdb:
      create: false
    resources:
      limits:
        cpu: 300m
        memory: 384Mi
      requests:
        cpu: 200m
        memory: 256Mi
    updateStrategy:
      type: Recreate
