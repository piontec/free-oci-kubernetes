apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: mealie-egress
  namespace: mealie
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Recipe import/export, external APIs
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: mealie-ingress
  namespace: mealie
spec:
  endpointSelector: {}
  ingress:
    # Gateway API envoy → Mealie UI
    - fromEntities:
        - ingress
    # Prometheus scraping
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
