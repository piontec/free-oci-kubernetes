apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: mariadb-egress
  namespace: db
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # mariadb-operator needs kube-apiserver access
    - toEntities:
        - kube-apiserver
    # mariadb-operator intra-namespace coordination
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: db
    # MariaDB backup jobs → Backblaze B2 S3-compatible storage
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: mariadb-ingress
  namespace: db
spec:
  endpointSelector: {}
  ingress:
    # Paperless-NGX → MariaDB
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: paperless
      toPorts:
        - ports:
            - port: "3306"
              protocol: TCP
    # WordPress → MariaDB
    #- fromEndpoints:
    #    - matchLabels:
    #        k8s:io.kubernetes.pod.namespace: wordpress-namespace
    #  toPorts:
    #    - ports:
    #        - port: "3306"
    #          protocol: TCP
    # Prometheus scraping
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
    # mariadb-operator webhook from kube-apiserver
    # 'kube-apiserver' entity matches public IP; fromCIDR covers private VCN IP (10.0.0.150).
    # remote-node is required because kube-apiserver traffic may arrive at a different worker node
    # and be forwarded via Cilium overlay — the source IP then becomes the remote node's overlay IP
    # (e.g. 10.244.0.115), which matches neither kube-apiserver nor the VCN CIDR.
    - fromEntities:
        - kube-apiserver
        - remote-node
    # Intra-namespace: mariadb-operator ↔ database pods
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: db
