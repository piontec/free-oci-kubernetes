apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring
  namespace: flux-system
spec:
  interval: 1h
  path: ./flux-modules/monitoring
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
  postBuild:
    substitute:
      grafana_domain: "YOUR_DOMAIN"
      grafana_url: "https://YOUR_DOMAIN/grafana"
      oci_region: "eu-frankfurt-1"
